<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IBR · Historial de Ventas 2022-2025</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0A0A;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  padding-bottom:40px;font-size:16px}
.header{background:#1A1A1A;border-bottom:2px solid #8B0000;
  padding:16px 20px;position:sticky;top:0;z-index:100;
  display:flex;justify-content:space-between;align-items:center}
.kpis{display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:16px}
.kpi{background:#1E1E1E;border-radius:12px;padding:14px;
  border-left:3px solid #8B0000}
.kpi-label{color:#999;font-size:12px;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:4px}
.kpi-val{font-size:28px;font-weight:700;color:#fff}
.filtros{padding:0 16px 12px}
.scroll-filtros{display:flex;gap:8px;overflow-x:auto;
  padding-bottom:8px;scrollbar-width:none}
.scroll-filtros::-webkit-scrollbar{display:none}
.btn-filtro{background:#2A2A2A;color:#aaa;border:1px solid #333;
  padding:8px 16px;border-radius:20px;font-size:14px;
  font-weight:600;white-space:nowrap;cursor:pointer;
  transition:all 200ms}
.btn-filtro.activo{color:#fff;border-color:transparent}
input[type=text],select{width:100%;padding:13px;
  background:#1E1E1E;color:#fff;border:1px solid #333;
  border-radius:10px;font-size:16px;margin-bottom:10px;outline:none}
.card{background:#1E1E1E;border-radius:12px;padding:16px;
  margin-bottom:12px;border-left:3px solid #444;
  transition:border-color 200ms}
.card-header{display:flex;justify-content:space-between;
  align-items:flex-start;margin-bottom:8px}
.card-nombre{font-weight:700;font-size:19px;flex:1}
.badge{padding:5px 12px;border-radius:20px;font-size:12px;
  font-weight:700;white-space:nowrap;margin-left:8px}
.badge-venta{background:#16A34A;color:#fff}
.badge-cancelado{background:#DC2626;color:#fff}
.badge-otro{background:#D97706;color:#fff}
.badge-pendiente{background:#555;color:#fff}
.card-sub{color:#ddd;font-size:16px;margin:6px 0;font-weight:500}
.card-footer{display:flex;justify-content:space-between;
  align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px}
.tag-asesor{font-size:14px;font-weight:700;
  padding:4px 12px;border-radius:20px}
.card-comision{font-size:18px;font-weight:700;color:#fff}
.wa-btn{background:#16A34A;color:#fff;padding:8px 16px;
  border-radius:6px;font-size:14px;text-decoration:none;
  font-weight:600;display:inline-block}
.expandir{background:none;border:none;color:#777;
  font-size:14px;cursor:pointer;padding:6px 0;
  width:100%;text-align:center;margin-top:8px}
.detalle{display:none;margin-top:10px;padding-top:10px;
  border-top:1px solid #2A2A2A}
.campo-edit{width:100%;padding:10px;background:#2A2A2A;
  color:#fff;border:1px solid #444;border-radius:8px;
  font-size:15px;margin-top:4px}
.label-edit{color:#aaa;font-size:13px;
  text-transform:uppercase;letter-spacing:1px}
.btn-guardar{background:#8B0000;color:#fff;border:none;
  padding:10px 20px;border-radius:8px;font-size:15px;
  font-weight:600;cursor:pointer;margin-top:10px;width:100%}
.grupo-titulo{color:#8B0000;font-size:13px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  padding:18px 16px 8px;border-top:1px solid #1A1A1A}
.cte-num{color:#aaa;font-size:14px;margin-right:6px}
.sin-resultados{color:#555;text-align:center;padding:48px 0;font-size:18px;font-weight:700}
</style>
</head>

  <div class="scroll-filtros" style="margin-top:8px"

</div>

const ANIOS_DESARROLLO = {
  'Grand Mayan': 2022,
  'Don Clemente': 2022,
  'Las Animas': 2022,
  'Monte Misen': 2023,
  'San Antonio': 2023,
  'HN Bosques de Sayab': 2023,
  'Orquídea Campestre': 2024,
  'Sima Park': 2024,
  'El Arenal': 2024,
  'La Cañada': 2024,

// Ordenar por Cte DESCENDENTE (más reciente primero)
DATOS.sort((a,b)=>b.cte-a.cte)

// Estado editable en localStorage
function getEdits(){
  return JSON.parse(localStorage.getItem('ibr_hist_edits')||'{}')
}
function saveEdit(cte,campo,valor){
  const e=getEdits()
  if(!e[cte])e[cte]={}
  e[cte][campo]=valor
  localStorage.setItem('ibr_hist_edits',JSON.stringify(e))
}

let filtroAsesor='todos'
let filtroEstatus='todos'
let filtroAnio='todos'
let filtroDesarrollo='todos'

function setFiltroDesarrollo(v){
  filtroDesarrollo=v
  renderizar()
}

function setFiltroAnio(v,btn){
  filtroAnio=v
  document.querySelectorAll('[id^="fy-"]')
    .forEach(b=>{b.style.background='#2A2A2A';
      b.style.color='#888';b.style.border='1px solid #333'})
  btn.style.background='#8B0000'
  btn.style.color='#fff'
  btn.style.border='none'
  renderizar()
}

function setFiltroAsesor(v,btn){
  filtroAsesor=v
  document.querySelectorAll('[id^="fa-"]')
    .forEach(b=>{b.style.background='#2A2A2A';
      b.style.color='#888';b.style.border='1px solid #333'})
  btn.style.background=COLORES[v]||'#8B0000'
  btn.style.color='#fff'
  btn.style.border='none'
  renderizar()
}

function setFiltroEstatus(v,btn){
  filtroEstatus=v
  document.querySelectorAll('[id^="fe-"]')
    .forEach(b=>{b.style.background='#2A2A2A';
      b.style.color='#888';b.style.border='1px solid #333'})
  btn.style.background='#8B0000'
  btn.style.color='#fff'
  btn.style.border='none'
  renderizar()
}

function toggleDetalle(cte){
  const d=document.getElementById('d-'+cte)
  const btn=document.getElementById('btn-'+cte)
  if(d.style.display==='block'){
    d.style.display='none'
    btn.textContent='▼ Ver detalle'
  } else {
    d.style.display='block'
    btn.textContent='▲ Cerrar'
  }
}

function guardarEdit(cte){
  const est=document.getElementById('est-'+cte)?.value
  const com=document.getElementById('com-'+cte)?.value
  if(est)saveEdit(cte,'estatus',est)
  if(com!==undefined&&com!=='')saveEdit(cte,'comision',parseFloat(com)||0)
  renderizar()
}

function renderizar(){
  const q=document.getElementById('buscador').value.toLowerCase()
  const edits=getEdits()

  let datos=datosVentas.map(d=>{
    const e=edits[d.cte]||{}
    const anio = ANIOS_DESARROLLO[d.desarrollo] || 2022;
    return{...d,
      anio: anio,
      estatus:e.estatus||d.estatus,
      comision:e.comision!==undefined?e.comision:d.comision}
  }).filter(d=>{
    const mA=filtroAsesor==='todos'||d.asesor===filtroAsesor
    const mE=filtroEstatus==='todos'||d.estatus===filtroEstatus
    const mY=filtroAnio==='todos'||d.anio===Number(filtroAnio)
    const mD=filtroDesarrollo==='todos'||d.desarrollo===filtroDesarrollo
    const mQ=!q||d.nombre.toLowerCase().includes(q)||
      d.desarrollo.toLowerCase().includes(q)||
      d.lote.toLowerCase().includes(q)
    return mA&&mE&&mY&&mD&&mQ
  })

  // Ordenar por año desc, luego cte desc
  datos.sort((a,b)=>{
    if(b.anio !== a.anio) return b.anio - a.anio;
    return b.cte - a.cte;
  });

  // KPIs (siempre sobre todos los datos con edits aplicados)
  const todos=datosVentas.map(d=>{
    const e=edits[d.cte]||{}
    return{...d,estatus:e.estatus||d.estatus,
      comision:e.comision!==undefined?e.comision:d.comision}
  })
  document.getElementById('kVentas').textContent=
    todos.filter(d=>d.estatus==='Venta').length
  document.getElementById('kCancelados').textContent=
    todos.filter(d=>d.estatus==='Cancelado').length
  document.getElementById('kPendientes').textContent=
    todos.filter(d=>d.estatus==='Pendiente'||d.estatus==='Otro').length
  const totalCom=todos.filter(d=>d.estatus==='Venta')
    .reduce((s,d)=>s+d.comision,0)
  document.getElementById('kComisiones').textContent=
    '$'+totalCom.toLocaleString('es-MX',{minimumFractionDigits:0})

  if(!datos.length){
    document.getElementById('contenido').innerHTML=
      '<div class="sin-resultados">Sin resultados</div>'
    return
  }

  // Agrupar por desarrollo
  const grupos={}
  datos.forEach(d=>{
    if(!grupos[d.desarrollo])grupos[d.desarrollo]=[]
    grupos[d.desarrollo].push(d)
  })

  let html=''
  Object.keys(grupos).forEach(des=>{
    html+=`<div class="grupo-titulo">
      ${des} &middot; ${grupos[des].length} registros
    </div><div style="padding:0 16px">`
    grupos[des].forEach(d=>{
      const color=COLORES[d.asesor]||'#8B0000'
      const bc=d.estatus==='Cancelado'?'#DC2626':
        d.estatus==='Pendiente'?'#555':color
      const badgeCls=d.estatus==='Venta'?'badge-venta':
        d.estatus==='Cancelado'?'badge-cancelado':
        d.estatus==='Pendiente'?'badge-pendiente':
        'badge-otro'
      html+=`
      <div class="card" style="border-left-color:${bc}">
        <div class="card-header">
          <div>
            <span class="cte-num">Cte ${d.cte}</span>
            <span class="card-nombre">${d.nombre}</span>
          </div>
          <div style="display:flex;gap:4px;align-items:center">
            <span class="badge" style="background:#2A2A2A;color:#aaa;border:1px solid #444">${d.anio}</span>
            <span class="badge ${badgeCls}">${d.estatus}</span>
          </div>
        </div>
        <div class="card-sub">🏘️ ${d.desarrollo} · 📍 ${d.lote}</div>
        <div class="card-footer">
          <span class="tag-asesor"
            style="background:${color}22;color:${color}">
            ${d.asesor.split(' ')[0]}
          </span>
          ${d.comision>0?
            `<span class="card-comision">
              $${d.comision.toLocaleString('es-MX')}
            </span>`:''}
          ${d.tel?
            `<a href="https://wa.me/52${d.tel}"
              target="_blank" class="wa-btn">
              💬 WA
            </a>`:''}
        </div>
        <button class="expandir" id="btn-${d.cte}"
          onclick="toggleDetalle(${d.cte})">
          ▼ Ver detalle
        </button>
        <div class="detalle" id="d-${d.cte}">
          <div class="label-edit">Estatus</div>
          <select class="campo-edit" id="est-${d.cte}">
            <option value="Venta"
              ${d.estatus==='Venta'?'selected':''}>
              ✅ Venta</option>
            <option value="Cancelado"
              ${d.estatus==='Cancelado'?'selected':''}>
              ❌ Cancelado</option>
            <option value="Pendiente"
              ${d.estatus==='Pendiente'?'selected':''}>
              ⏳ Pendiente</option>
            <option value="Otro"
              ${d.estatus==='Otro'?'selected':''}>
              📋 Otro</option>
          </select>
          <div class="label-edit" style="margin-top:10px">
            Comisión pactada ($)
          </div>
          <input type="number" class="campo-edit"
            id="com-${d.cte}"
            value="${d.comision||''}"
            placeholder="0.00">
          <button class="btn-guardar"
            onclick="guardarEdit(${d.cte})">
            💾 Guardar cambios
          </button>
        </div>
      </div>`
    })
    html+='</div>'
  })
  document.getElementById('contenido').innerHTML=html
}

function initDesarrollos() {
  const devs = [...new Set(datosVentas.map(d => d.desarrollo))].sort();
  const select = document.getElementById('filtroDesarrollo');
  if(select) {
    select.innerHTML = '<option value="todos">Todos los Desarrollos</option>' + 
      devs.map(d => `<option value="${d}">${d}</option>`).join('');
  }
}

let datosVentas = [];
const cacheData = localStorage.getItem('ibr_hist_data');
if (cacheData) {
  datosVentas = JSON.parse(cacheData);
} else {
  datosVentas = [...DATOS];
}

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxsVD1cbCr0OKNyw990CDVOjA3YXMpy2-4szsqo-MdgXlo3YU_dz7lkUsrbpuq1yJusdA/exec';

function cargarDatosSheet() {
  const cbName = 'histCB_' + Date.now();
  window[cbName] = function(response) {
    delete window[cbName];
    document.getElementById('jsonp-hist-script')?.remove();
    
    if (response && response.ok && response.datos) {
      datosVentas = response.datos;
      localStorage.setItem('ibr_hist_data', JSON.stringify(datosVentas));
      initDesarrollos();
      renderizar();
    }
  };
  
  const script = document.createElement('script');
  script.id = 'jsonp-hist-script';
  script.src = APPS_SCRIPT_URL + '?action=historico&callback=' + cbName + '&v=' + Date.now();
  script.onerror = () => {
    console.warn('Error al cargar datos desde Google Sheet, usando datos locales.');
  };
  document.body.appendChild(script);
}

initDesarrollos();
localStorage.setItem('ibr_hist_data', JSON.stringify(datosVentas));
renderizar();
cargarDatosSheet();
</script>
