// COLORES POR ASESOR
const COLORES_ASESOR = {
  'Carmen Jiménez': '#0891B2',
  'Lupyta Mendoza': '#7C3AED',
  'Luis García': '#059669',
  'Daniel Vázquez': '#8B0000'
}

let filtroAsesorActivo = 'todos'
let filtroEstatusActivo = 'todos'
let filtroAnioActivo = 'todos'

function calcularKPIs() {
  const ventas = VENTAS_HISTORICAS
    .filter(v=>v.estatus==='Venta')
  const cancelados = VENTAS_HISTORICAS
    .filter(v=>v.estatus==='Cancelado')
  const pendientes = VENTAS_HISTORICAS
    .filter(v=>v.estatus==='Otro')
  const total = ventas.reduce(
    (s,v)=>s+(v.comision||0),0)

  document.getElementById('kpiVentas')
    .textContent = ventas.length
  document.getElementById('kpiCancelados')
    .textContent = cancelados.length
  document.getElementById('kpiPendientes')
    .textContent = pendientes.length
  document.getElementById('kpiComisiones')
    .textContent = '$'+(total/1000).toFixed(0)+'K'
}

function filtrarAsesor(asesor) {
  filtroAsesorActivo = asesor
  
  document.querySelectorAll('[id^="fa-"]')
    .forEach(b=>{
      b.style.background='#2A2A2A'
      b.style.color='#888'
      b.style.border='1px solid #333'
    })

  const ids = {
    'todos':'fa-todos',
    'Carmen Jiménez':'fa-carmen',
    'Lupyta Mendoza':'fa-lupyta',
    'Luis García':'fa-luis',
    'Daniel Vázquez':'fa-daniel'
  }
  const btn = document.getElementById(ids[asesor])
  if(btn){
    const color = COLORES_ASESOR[asesor]||'#8B0000'
    btn.style.background = color
    btn.style.color = '#fff'
    btn.style.border = 'none'
  }
  renderLista()
}

function filtrarAnio(anio) {
  filtroAnioActivo = anio
  document.querySelectorAll('[id^="fy-"]')
    .forEach(b=>{
      b.style.background='#2A2A2A'
      b.style.color='#888'
      b.style.border='1px solid #333'
    })
  const btn = document.getElementById('fy-'+(anio==='todos'?'todos':anio))
  if(btn){
    btn.style.background='#8B0000'
    btn.style.color='#fff'
    btn.style.border='none'
  }
  renderLista()
}

function filtrar() {
  filtroEstatusActivo = document.getElementById(
    'filtroEstatus').value
  renderLista()
}

function renderLista() {
  const q = document.getElementById('buscador')
    .value.toLowerCase()

  let datos = VENTAS_HISTORICAS.filter(v => {
    const matchAsesor = filtroAsesorActivo==='todos'||
      v.asesor===filtroAsesorActivo
    const matchEstatus = filtroEstatusActivo==='todos'||
      v.estatus===filtroEstatusActivo
    const matchAnio = filtroAnioActivo==='todos'||
      String(v.anio)===String(filtroAnioActivo)
    const matchBuscar = !q ||
      v.nombre.toLowerCase().includes(q)||
      v.desarrollo.toLowerCase().includes(q)||
      v.lote.toLowerCase().includes(q)
    return matchAsesor && matchEstatus && matchAnio && matchBuscar
  })

  // Ordenar por año descendente (más reciente primero)
  datos.sort((a,b) => (b.anio||0) - (a.anio||0))

  const lista = document.getElementById('listaVentas')

  if(!datos.length){
    lista.innerHTML = '<div style="color:#444;'+
      'text-align:center;padding:48px">'+
      'Sin resultados</div>'
    return
  }

  lista.innerHTML = datos.map(v => {
    const color = COLORES_ASESOR[v.asesor]||'#8B0000'
    return `
    <div style="background:#1E1E1E;
      border-radius:12px;padding:16px;
      margin-bottom:10px;
      border-left:3px solid ${
        v.estatus==='Cancelado'?'#DC2626':color}">
      <div style="display:flex;
        justify-content:space-between;
        align-items:flex-start;
        margin-bottom:6px">
        <div style="color:#fff;font-weight:700;
          font-size:14px;flex:1">
          ${v.nombre}
        </div>
        <span style="background:${
          v.estatus==='Cancelado'?'#DC2626':
          v.estatus==='Venta'?'#16A34A':'#D97706'};
          color:#fff;padding:2px 8px;
          border-radius:20px;font-size:10px;
          font-weight:700;margin-left:8px;
          white-space:nowrap">
          ${v.estatus}
        </span>
      </div>
      <div style="color:#555;font-size:12px;
        margin-bottom:4px">
        🏘️ ${v.desarrollo} · ${v.lote}
      </div>
      <div style="margin-bottom:8px">
        <span style="background:#2A2A2A;color:#666;
          font-size:10px;font-weight:700;
          padding:2px 8px;border-radius:20px;
          letter-spacing:1px">📅 ${v.anio}</span>
      </div>
      <div style="display:flex;
        justify-content:space-between;
        align-items:center;margin-top:8px">
        <span style="color:${color};
          font-size:11px;font-weight:600;
          background:${color}22;
          padding:3px 10px;border-radius:20px">
          ${v.asesor.split(' ')[0]}
        </span>
        ${v.comision>0?`
        <span style="color:#fff;font-size:13px;
          font-weight:700">
          $${v.comision.toLocaleString('es-MX')}
        </span>`:''}
      </div>
      ${v.tel?`
      <a href="https://wa.me/52${v.tel}"
        target="_blank"
        style="display:inline-block;margin-top:8px;
        background:#16A34A;color:#fff;
        padding:6px 12px;border-radius:6px;
        font-size:12px;text-decoration:none;
        font-weight:600">
        💬 ${v.tel}
      </a>`:''}
    </div>`}).join('')
}
