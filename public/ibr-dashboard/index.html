<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBR - Panel de Control</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#141414',
                        cream: '#F7F1E8',
                        gold: {
                            DEFAULT: '#B8924A',
                            hover: '#9E7B3B',
                            light: 'rgba(184, 146, 74, 0.15)'
                        },
                        card: '#1E1E1E',
                        border: '#2A2A2A',
                        inactive: '#2A2A2A',
                        secondary: '#9E9E9E'
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #141414;
            color: #F7F1E8;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .font-title {
            font-family: 'Cormorant Garamond', serif;
        }
        /* Hide scrollbars */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom input focus ring */
        .focus-gold:focus {
            outline: none;
            border-color: #B8924A;
            box-shadow: 0 0 0 2px rgba(184, 146, 74, 0.25);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-gold selection:text-bg">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex-1 flex flex-col items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-card border border-border p-8 rounded-2xl shadow-xl flex flex-col items-center">
            <!-- Branding -->
            <div class="text-center mb-8">
                <span class="text-gold text-sm tracking-[0.3em] font-semibold uppercase">Inmobiliaria Bienes Raíces</span>
                <h1 class="font-title text-4xl font-semibold mt-2 text-cream">IBR Dashboard</h1>
                <div class="h-[1px] w-24 bg-gold/30 mx-auto mt-4"></div>
            </div>

            <!-- Access form -->
            <div id="step-token" class="w-full space-y-4">
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold font-bold mb-1.5">Token de Acceso</label>
                    <input type="text" id="input-token" placeholder="Introduce tu token o pega tu enlace" 
                           class="w-full bg-[#2A2A2A] border border-border text-cream rounded-lg px-4 py-3 text-sm focus-gold">
                </div>
                <button onclick="checkToken()" class="w-full bg-gold hover:bg-gold-hover text-bg font-bold py-3 px-4 rounded-lg transition-colors text-sm uppercase tracking-wider">
                    Continuar →
                </button>
            </div>

            <!-- PIN form -->
            <div id="step-pin" class="w-full space-y-4 hidden">
                <div class="text-center mb-2">
                    <p class="text-xs text-secondary">Usuario identificado:</p>
                    <p id="label-user-name" class="text-lg font-title font-semibold text-gold"></p>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-gold font-bold mb-1.5">Código PIN</label>
                    <input type="password" id="input-pin" inputmode="numeric" placeholder="****" maxlength="12"
                           class="w-full bg-[#2A2A2A] border border-border text-cream text-center text-xl tracking-[0.5em] rounded-lg px-4 py-3 focus-gold">
                </div>
                <div class="flex gap-2">
                    <button onclick="backToToken()" class="w-1/3 bg-[#2A2A2A] border border-[#2A2A2A] hover:bg-[#3A3A3A] text-cream font-bold py-3 px-2 rounded-lg transition-colors text-xs uppercase tracking-wider">
                        Atrás
                    </button>
                    <button onclick="checkPin()" class="w-2/3 bg-gold hover:bg-gold-hover text-bg font-bold py-3 px-4 rounded-lg transition-colors text-sm uppercase tracking-wider">
                        Acceder
                    </button>
                </div>
            </div>

            <p id="login-error" class="text-red-500 text-xs mt-4 text-center hidden"></p>
        </div>
    </div>

    <!-- MAIN APP CONTAINER -->
    <div id="app-container" class="hidden flex-1 flex flex-col justify-between w-full max-w-6xl mx-auto px-4 md:px-6 py-6 pb-24 md:pb-6">
        <!-- Top bar / Header -->
        <header class="flex justify-between items-center border-b border-border pb-4 mb-6">
            <div>
                <span id="user-greeting" class="text-gold text-xs tracking-widest font-semibold uppercase">Hola</span>
                <h2 class="font-title text-2xl font-semibold text-cream">Panel IBR</h2>
            </div>
            <button onclick="logOut()" class="bg-[#2A2A2A] border border-[#2A2A2A] hover:bg-[#3A3A3A] text-cream text-xs font-bold py-2 px-4 rounded-lg transition-colors uppercase tracking-wider">
                Salir
            </button>
        </header>

        <!-- Dynamic Content Area -->
        <main class="flex-1 flex flex-col">
            <!-- TAB PANES -->
            <div id="tab-resumen" class="tab-pane hidden space-y-4">
                <h3 class="text-lg font-semibold uppercase tracking-wider text-gold font-title">Resumen</h3>
                <div class="bg-card border border-border p-6 rounded-2xl text-secondary text-sm">
                    No hay información disponible.
                </div>
            </div>

            <div id="tab-citas" class="tab-pane hidden space-y-4">
                <h3 class="text-lg font-semibold uppercase tracking-wider text-gold font-title">Citas</h3>
                <div class="bg-card border border-border p-6 rounded-2xl text-secondary text-sm">
                    No hay información disponible.
                </div>
            </div>

            <div id="tab-ventas" class="tab-pane hidden space-y-4">
                <h3 class="text-lg font-semibold uppercase tracking-wider text-gold font-title">Ventas</h3>
                <div class="bg-card border border-border p-6 rounded-2xl text-secondary text-sm">
                    No hay información disponible.
                </div>
            </div>

            <div id="tab-historico" class="tab-pane hidden space-y-4">
                <h3 class="text-lg font-semibold uppercase tracking-wider text-gold font-title">Histórico</h3>
                <div class="bg-card border border-border p-6 rounded-2xl text-secondary text-sm">
                    No hay información disponible.
                </div>
            </div>
        </main>

        <!-- Desktop Navigation -->
        <nav class="hidden md:flex justify-center border-t border-border mt-8 pt-4">
            <div class="flex gap-4">
                <button onclick="switchTab('resumen')" class="desktop-nav-btn px-6 py-2.5 rounded-lg text-sm font-semibold uppercase tracking-wider transition-colors bg-[#2A2A2A] text-cream hover:bg-[#3A3A3A]">Resumen</button>
                <button onclick="switchTab('citas')" class="desktop-nav-btn px-6 py-2.5 rounded-lg text-sm font-semibold uppercase tracking-wider transition-colors bg-[#2A2A2A] text-cream hover:bg-[#3A3A3A]">Citas</button>
                <button onclick="switchTab('ventas')" class="desktop-nav-btn px-6 py-2.5 rounded-lg text-sm font-semibold uppercase tracking-wider transition-colors bg-[#2A2A2A] text-cream hover:bg-[#3A3A3A]">Ventas</button>
                <button onclick="switchTab('historico')" class="desktop-nav-btn px-6 py-2.5 rounded-lg text-sm font-semibold uppercase tracking-wider transition-colors bg-[#2A2A2A] text-cream hover:bg-[#3A3A3A]">Histórico</button>
            </div>
        </nav>

        <!-- Mobile Floating Bottom Navigation -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-card border-t border-border py-2 px-4 flex justify-around items-center z-40 shadow-lg">
            <div class="w-full flex justify-around">
                <button onclick="switchTab('resumen')" class="mobile-nav-btn flex flex-col items-center text-[10px] uppercase font-bold tracking-widest gap-1 text-secondary">
                    <span class="text-xl">🏠</span><span>Resumen</span>
                </button>
                <button onclick="switchTab('citas')" class="mobile-nav-btn flex flex-col items-center text-[10px] uppercase font-bold tracking-widest gap-1 text-secondary">
                    <span class="text-xl">👥</span><span>Citas</span>
                </button>
                <button onclick="switchTab('ventas')" class="mobile-nav-btn flex flex-col items-center text-[10px] uppercase font-bold tracking-widest gap-1 text-secondary">
                    <span class="text-xl">💰</span><span>Ventas</span>
                </button>
                <button onclick="switchTab('historico')" class="mobile-nav-btn flex flex-col items-center text-[10px] uppercase font-bold tracking-widest gap-1 text-secondary">
                    <span class="text-xl">📊</span><span>Histórico</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Footer -->
    <footer class="text-center py-6 border-t border-border text-[10px] text-secondary tracking-wider uppercase">
        © 2026 IBR · Todos los derechos reservados
    </footer>

    <!-- LOGIC -->
    <script>
        const USERS = {
            "Daniel-Vazquez": { nombre: "Daniel Vázquez", rol: "admin", pin: "IBRDAVM1512" },
            "Lupyta-Mendoza": { nombre: "Lupyta Mendoza", rol: "asesor", pin: "2001" },
            "Carmen-Jimenez": { nombre: "Carmen Jiménez", rol: "asesor", pin: "3001" },
            "Luis-Garcia":    { nombre: "Luis García",    rol: "asesor", pin: "4001" }
        };

        let loggedUser = null;
        let currentTab = '';

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            let token = params.get('token') || localStorage.getItem('ibr_token');
            let pin = localStorage.getItem('ibr_pin');

            if (token && USERS[token]) {
                document.getElementById('input-token').value = token;
                showPinStep(token);
                if (pin && pin === USERS[token].pin) {
                    document.getElementById('input-pin').value = pin;
                    checkPin();
                }
            } else {
                showTokenStep();
            }
        });

        function showTokenStep() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('step-token').classList.remove('hidden');
            document.getElementById('step-pin').classList.add('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }

        function showPinStep(token) {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('step-token').classList.add('hidden');
            document.getElementById('step-pin').classList.remove('hidden');
            document.getElementById('label-user-name').innerText = USERS[token].nombre;
            document.getElementById('input-pin').focus();
        }

        function backToToken() {
            showTokenStep();
            document.getElementById('login-error').classList.add('hidden');
        }

        function checkToken() {
            let token = document.getElementById('input-token').value.trim();
            if (token.includes('?token=')) {
                const parts = token.split('?token=');
                token = parts[1].split('&')[0];
            }

            if (USERS[token]) {
                localStorage.setItem('ibr_token', token);
                showPinStep(token);
                document.getElementById('login-error').classList.add('hidden');
            } else {
                showLoginError('Token de acceso no válido.');
            }
        }

        function checkPin() {
            const token = localStorage.getItem('ibr_token');
            const pin = document.getElementById('input-pin').value.trim();

            if (USERS[token] && USERS[token].pin === pin) {
                localStorage.setItem('ibr_pin', pin);
                loggedUser = USERS[token];
                startApp();
            } else {
                showLoginError('Código PIN incorrecto.');
            }
        }

        function showLoginError(msg) {
            const el = document.getElementById('login-error');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        function logOut() {
            localStorage.removeItem('ibr_token');
            localStorage.removeItem('ibr_pin');
            loggedUser = null;
            location.reload();
        }

        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-greeting').innerText = `Hola, ${loggedUser.nombre} (${loggedUser.rol})`;
            
            switchTab('resumen');
        }

        function switchTab(tabId) {
            currentTab = tabId;
            
            // Hide all tab panes
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            
            // Show active pane
            const pane = document.getElementById('tab-' + tabId);
            if (pane) pane.classList.remove('hidden');

            // Highlight buttons
            document.querySelectorAll('.desktop-nav-btn, .mobile-nav-btn').forEach(btn => {
                const onClickStr = btn.getAttribute('onclick') || '';
                if (onClickStr.includes(`'${tabId}'`)) {
                    if (btn.classList.contains('mobile-nav-btn')) {
                        btn.classList.add('text-gold');
                        btn.classList.remove('text-secondary');
                    } else {
                        btn.classList.add('bg-gold', 'text-bg');
                        btn.classList.remove('bg-inactive', 'text-cream');
                    }
                } else {
                    if (btn.classList.contains('mobile-nav-btn')) {
                        btn.classList.remove('text-gold');
                        btn.classList.add('text-secondary');
                    } else {
                        btn.classList.remove('bg-gold', 'text-bg');
                        btn.classList.add('bg-inactive', 'text-cream');
                    }
                }
            });
        }
    </script>
</body>
</html>
