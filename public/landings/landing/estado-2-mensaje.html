    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #064e3b 0%, #020617 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Subtle animated background grid */
        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: panBg 20s linear infinite reverse;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 0 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            max-width: 500px;
            /* Mobile width container */
        }

        .icon-wrapper {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
            animation: pulseGlow 2s infinite, popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform: scale(0);
        }

        h1 {
            font-size: clamp(2rem, 7vw, 3rem);
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            animation-delay: 0.4s;
        }

        h1 span {
            color: #22c55e;
            display: block;
        }

        .cta-text {
            color: #cbd5e1;
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.5;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
            animation-delay: 0.7s;
        }

        /* Animations */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            to {
                transform: scale(1);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            70% {
                box-shadow: 0 0 0 25px rgba(34, 197, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        @keyframes panBg {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: -40px -40px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="content">
        <div class="icon-wrapper">
            <i data-lucide="message-circle" color="white" width="50" height="50"></i>
        </div>

        <h1>Conoce el <br><span>Arsenal Pro</span></h1>

        <div class="cta-text">
            Envíanos un mensaje ahora mismo para mandarte la página oficial y descubras nuestras opciones.
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
