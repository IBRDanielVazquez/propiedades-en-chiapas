    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom right, #020617, #000000);
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Particles container (CSS only simulation) */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: #f59e0b;
            border-radius: 50%;
            animation: rise linear infinite;
        }

        .particle:nth-child(1) {
            width: 5px;
            height: 5px;
            left: 10%;
            animation-duration: 5s;
            animation-delay: 1s;
        }

        .particle:nth-child(2) {
            width: 8px;
            height: 8px;
            left: 30%;
            animation-duration: 7s;
            animation-delay: 0s;
        }

        .particle:nth-child(3) {
            width: 3px;
            height: 3px;
            left: 50%;
            animation-duration: 4s;
            animation-delay: 2s;
        }

        .particle:nth-child(4) {
            width: 6px;
            height: 6px;
            left: 70%;
            animation-duration: 6s;
            animation-delay: 0.5s;
        }

        .particle:nth-child(5) {
            width: 10px;
            height: 10px;
            left: 90%;
            animation-duration: 8s;
            animation-delay: 1.5s;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 0 5%;
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .rocket-icon {
            color: #f59e0b;
            margin-bottom: 20px;
            animation: zoomIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, floatRocket 3s ease-in-out infinite alternate;
            opacity: 0;
            transform: scale(0);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 900;
            line-height: 1.1;
            text-transform: uppercase;
            animation: textExplode 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(1.2);
            animation-delay: 0.3s;
        }

        .highlight {
            color: #f59e0b;
            display: block;
            font-size: clamp(3rem, 10vw, 4rem);
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.6);
        }

        .sub-text {
            font-size: 1.3rem;
            color: #e2e8f0;
            margin-top: 10px;
            margin-bottom: 40px;
            animation: fadeUp 1s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            animation-delay: 0.8s;
        }

        .cta-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: black;
            font-weight: 900;
            font-size: 1.4rem;
            padding: 20px 50px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 15px 40px rgba(245, 158, 11, 0.5);
            animation: pulseGlowBtn 1.5s infinite, btnSlideUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: translateY(50px);
            animation-delay: 1.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Animations */
        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(1);
                opacity: 0;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                transform: translateY(-10vh) scale(0);
                opacity: 0;
            }
        }

        @keyframes zoomIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes floatRocket {
            0% {
                transform: translateY(0);
                filter: drop-shadow(0 10px 15px rgba(245, 158, 11, 0.2));
            }

            100% {
                transform: translateY(-15px);
                filter: drop-shadow(0 20px 30px rgba(245, 158, 11, 0.6));
            }
        }

        @keyframes textExplode {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes btnSlideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlowBtn {
            0% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.6);
            }

            70% {
                box-shadow: 0 0 0 25px rgba(245, 158, 11, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0);
            }
        }
    </style>
</head>

<body>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="content">
        <div class="rocket-icon">
            <i data-lucide="rocket" width="80" height="80" stroke-width="1.5"></i>
        </div>

        <h1>
            EL MOMENTO ES
            <span class="highlight">HOY</span>
        </h1>

        <div class="sub-text">Transforma tus cierres inmobiliarios.</div>

        <div class="cta-btn">
            <i data-lucide="phone-call" width="24" height="24"></i>
            CONTÁCTANOS
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
